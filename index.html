<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Ashan Pro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="img/ChatGPT Image 16 мар. 2026 г., 20_22_34.png" type="image/png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<div class="background"></div>

<div class="container">

    <div class="top-bar">
        <h1>Ashan Pro 26.1</h1>
    </div>

    <div class="search-wrapper glass">
        <div id="clock"></div>

<div class="search-box-wrapper">
    <div class="search-indicator" id="searchIndicator"></div>
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Введите запрос..." autocomplete="off">
        <button onclick="search()">Поиск</button>
        <button onclick="startVoiceSearch()">🎙️</button>
    </div>
</div>


 </div>
        <div id="suggestions" class="suggestions glass"></div>
   

    <h4>Выбор поисковика или ИИ</h4>
    <div class="label-wrapper glass">
    <div class="label-indicator" id="labelIndicator"></div>
    <div id="currentEngineLabel" class="engine-label">Google</div>
</div>




    <div class="engines glass">

        <div class="engine-indicator" id="engineIndicator"></div>

        <div class="engine-card" onclick="setEngine('google', this)">
            <img src="https://brandlogos.net/wp-content/uploads/2025/05/google_icon_2025-logo_brandlogos.net_qm5ka-300x307.png" width="25">
        </div>

        <div class="engine-card" onclick="setEngine('yandex', this)">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/58/Yandex_icon.svg/960px-Yandex_icon.svg.png" width="25">
        </div>

        <div class="engine-card" onclick="setEngine('duckduckgo', this)">
            <img src="https://upload.wikimedia.org/wikipedia/en/9/90/The_DuckDuckGo_Duck.png" width="25">
        </div>

        <div class="engine-card" onclick="setEngine('bing', this)">
            <img src="https://cdn-icons-png.flaticon.com/512/3664/3664992.png" width="25">
        </div>

        <div class="engine-card" onclick="setEngine('yahoo', this)">
            <img src="https://cdn-icons-png.flaticon.com/512/3128/3128296.png" width="25">
        </div>

  <div class="engine-card" onclick="setEngine('perplexity', this)">
    <img src="https://aws.amazon.com/startups/upload/e4d8d468-90d1-704f-a34e-7e195ce4025a/ceac2e85-dca6-4da4-bbf7-359df7db739d.png" width="25">
</div>

<div class="engine-card" onclick="setEngine('you', this)">
    <img src="https://downloadr2.apkmirror.com/wp-content/uploads/2025/02/98/67bc2dbb26bcd_com.you.browser.png" width="25">
</div>


    </div>

    <h4>Темы</h4>

<div class="controls glass">

    <div class="controls-indicator" id="controlsIndicator"></div>

    <button onclick="toggleTheme()">Тема</button>
    <button onclick="document.getElementById('bgUpload').click()">Загрузить Обои</button>
    <button onclick="openSystemWallpapers()">Системные Обои</button>
    <button onclick="resetBackground()">Стиль по умолчанию</button>

    <input type="file" id="bgUpload" accept="image/*" hidden>
</div>

<div class="system-wallpapers glass" id="systemWallpapers">

    <div class="wallpaper" onclick="setSystemWallpaper(0)"></div>
    <div class="wallpaper" onclick="setSystemWallpaper(1)"></div>
    <div class="wallpaper" onclick="setSystemWallpaper(2)"></div>
    <div class="wallpaper" onclick="setSystemWallpaper(3)"></div>

</div>

<script src="script.js"></script>
</body>
</html>
